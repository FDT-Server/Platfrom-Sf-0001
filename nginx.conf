user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access_log.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;

    gzip on;
    gzip_disable "msie6";
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    upstream nextjs_upstream {
        least_conn;
        
        server 127.0.0.1:3000 weight=3 max_fails=3 fail_timeout=30s;
        server 127.0.0.1:3001 weight=3 max_fails=3 fail_timeout=30s;
        server 127.0.0.1:3002 weight=1 backup;
        
        keepalive 32;
    }

    limit_req_zone $binary_remote_addr zone=leaky_bucket:10m rate=10r/s;

    limit_conn_zone $binary_remote_addr zone=addr:10m;

    map $http_user_agent $is_bot {
        default 0;
        ~*(SemrushBot|AhrefsBot|DotBot|MJ12bot|YandexBot|coccocbot|Go-http-client|curl|wget) 1;
    }

    server {
        listen 80;
        listen [::]:80;
        server_name studentforge.com www.studentforge.com;

        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name studentforge.com www.studentforge.com;

        ssl_certificate /etc/letsencrypt/live/studentforge.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/studentforge.com/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_ciphers 'ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256';
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;
        add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline' 'unsafe-eval';" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

        if ($is_bot) {
            return 403;
        }

        location / {
            limit_req zone=leaky_bucket burst=20 nodelay;
            
            limit_conn addr 10;

            proxy_pass http://nextjs_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_buffering on;
            proxy_buffers 128 32k;
            proxy_buffer_size 64k;
            proxy_busy_buffers_size 128k;
        }

        location /_next/static/ {
            alias /var/www/studentforge/.next/static/;
            expires 365d;
            access_log off;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        location /public/ {
            alias /var/www/studentforge/public/;
            expires 30d;
            access_log off;
            add_header Cache-Control "public, max-age=2592000, must-revalidate";
        }

        error_page 502 503 504 /50x.html;
        location = /50x.html {
            root /var/www/studentforge/public/;
            internal;
        }

        error_page 429 /429.html;
        location = /429.html {
            root /var/www/studentforge/public/;
            internal;
        }
    }
}
